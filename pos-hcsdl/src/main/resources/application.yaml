spring:
  application:
    name: POS Database System
  datasource:
    url: jdbc:mysql://localhost:3306/pos?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update   # có thể đổi thành create-drop nếu muốn reset DB mỗi lần chạy
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
server:
  port: 9001
